{% extends "base.html" %} {% block content %}
<section class="section">
  <div class="container">
    <div
      class="is-flex is-justify-content-space-between is-align-items-center mb-5"
    >
      <div>
        <h1 class="title mb-1">Roles</h1>
        <p class="subtitle is-6 has-text-grey">Permissões do sistema</p>
      </div>
      <a href="/roles/new" class="button is-primary">
        <span class="icon"><i class="fas fa-plus"></i></span>
        <span>Nova role</span>
      </a>
    </div>

    <div class="box p-0">
      <table class="table is-fullwidth is-hoverable mb-0">
        <thead>
          <tr>
            <th style="width: 60px">#</th>
            <th>Nome</th>
            <th style="width: 120px"></th>
          </tr>
        </thead>
        <tbody>
          {% for role in roles %}
          <tr>
            <td class="has-text-grey">{{ role.id }}</td>
            <td><span class="is-light">{{ role.name }}</span></td>
            <td class="has-text-right">
              <a
                href="/roles/{{ role.id }}/edit"
                class="button is-small is-ghost"
              >
                <span class="icon"><i class="fa-solid fa-edit"></i></span>
              </a>
              <form
                method="POST"
                action="/roles/{{ role.id }}/delete"
                style="display: inline"
              >
                <button
                  type="submit"
                  class="button is-small is-ghost has-text-danger"
                >
                  <span class="icon"><i class="fa-solid fa-trash"></i></span>
                </button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="3" class="has-text-centered has-text-grey py-5">
              Nenhuma role cadastrada.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
